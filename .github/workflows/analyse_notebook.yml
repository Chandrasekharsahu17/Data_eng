name: Daily Notebook Analyser

on:
  push:
    paths:
      - 'notebooks/**/*.ipynb'

  workflow_dispatch:
    inputs:
      day_number:
        description: 'Day number to score (e.g. 2)'
        required: true
        default: '1'

  schedule:
    - cron: '0 17 * * 1-5'    # 10:30 PM IST weekdays — reminder
    - cron: '30 11 * * 1-5'   # 5:00 PM IST weekdays — scoring
    - cron: '30 4  * * 6'     # Saturday reminder
    - cron: '30 4  * * 0'     # Sunday reminder

permissions:
  contents: write
  issues: write

jobs:

  # ─── PUSH: only acknowledge ─────────────────────────────
  confirm_push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Post acknowledgement issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep '\.ipynb' | head -1 || echo "")
          DAY=$(echo "$CHANGED" | grep -oP '(?<=day_)\d+' | head -1 || echo "?")

          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues" \
            -d "{\"title\": \"📥 Day $DAY notebook received — scoring at 5 PM IST\", \"body\": \"Notebook saved. Scoring runs at 5 PM IST.\", \"labels\": [\"received\"]}"

  # ─── SCHEDULE + MANUAL ─────────────────────────────
  run_pipeline:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
      NOTIFY_EMAIL: sahuchandrasekhar4@gmail.com

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ✅ Always run reminder (safe)
      - name: Run reminders
        if: github.event_name == 'schedule'
        run: python scripts/deadline_reminder.py

      # ✅ CRITICAL FIX: Always run scoring explicitly
      - name: Run scoring (latest day)
        if: github.event_name == 'schedule'
        run: python scripts/analyse_notebook.py

      # ✅ Manual scoring
      - name: Manual scoring
        if: github.event_name == 'workflow_dispatch'
        run: python scripts/analyse_notebook.py ${{ github.event.inputs.day_number }}

      # ✅ Commit updates
      - name: Commit changes
        run: |
          git config user.name "Study-Bot"
          git config user.email "study-bot@auto.com"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Auto-update — score + next day"
          git push
